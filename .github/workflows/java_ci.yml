name: CI 

on:
  push:
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
        
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify -Pcoverage org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=DivyenduDutta_Github-Assistant-MCP-Server      

      - name: Run Spotless (lint check)
        run: mvn spotless:check

      - name: Run SpotBugs (static analysis)
        run: mvn spotbugs:check

      - name: Run PMD (code analysis)
        run: mvn pmd:check